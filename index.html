<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cardápio</title>
</head>
<body style="margin:0;background:#fff;">
  <div style="max-width:820px;margin:0 auto;padding:18px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
    <header style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <div>
        <h1 style="margin:0;font-size:24px;">Cardápio - Dona Brownie</h1>
        <div style="opacity:.7;margin-top:4px;">Escolha os itens e finalize na DM do Instagram</div>
      </div>
      <a id="igLink" href="#" target="_blank" rel="noreferrer" style="text-decoration:none;border:1px solid #ddd;padding:10px 12px;border-radius:12px;">
        Instagram
      </a>
    </header>

    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-top:18px;">
      <section>
        <h2 style="margin:0 0 10px;">Produtos</h2>
        <div id="produtos" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;"></div>
      </section>

      <aside style="border:1px solid #eee;border-radius:14px;padding:14px;height:fit-content;">
        <h2 style="margin:0 0 10px;">Carrinho</h2>
        <div id="carrinho" style="display:flex;flex-direction:column;gap:8px;"></div>

        <hr style="margin:12px 0;border:none;border-top:1px solid #eee;">

        <div style="display:flex;justify-content:space-between;font-weight:800;">
          <span>Total</span>
          <span id="total">R$ 0,00</span>
        </div>

        <h3 style="margin:14px 0 8px;">Seus dados</h3>

        <label style="display:block;margin-top:8px;">
          Nome
          <input id="nome" placeholder="Seu nome"
            style="width:100%;margin-top:6px;padding:10px;border:1px solid #ddd;border-radius:12px;outline:none;">
        </label>

        <label style="display:block;margin-top:10px;">
          Telefone/WhatsApp
          <input id="fone" placeholder="(DD) 99999-9999"
            style="width:100%;margin-top:6px;padding:10px;border:1px solid #ddd;border-radius:12px;outline:none;">
        </label>

        <label style="display:block;margin-top:10px;">
          Retirada ou entrega?
          <select id="tipo"
            style="width:100%;margin-top:6px;padding:10px;border:1px solid #ddd;border-radius:12px;outline:none;background:#fff;">
            <option value="RETIRADA">Retirada</option>
            <option value="ENTREGA">Entrega</option>
          </select>
        </label>

        <button id="finalizar"
          style="width:100%;margin-top:12px;padding:12px;border-radius:14px;border:1px solid #111;background:#111;color:#fff;font-weight:800;cursor:pointer;">
          Finalizar pedido no Instagram
        </button>

        <div style="margin-top:10px;font-size:12px;opacity:.7;line-height:1.35;">
          Ao clicar, abriremos o Instagram com a mensagem do pedido pronta.
        </div>
      </aside>
    </div>

    <footer style="margin-top:18px;font-size:12px;opacity:.6;">
      Dica: coloque este link na bio do Instagram.
    </footer>
  </div>

<script>
  // ========= CONFIGURE AQUI =========
  const INSTAGRAM_USER = "donabrownie__"; // sem @

  // Edite seus produtos:
  const produtos = [
    { id: "b1", nome: "Brownie Tradicional", preco: 12.90, desc: "Massa chocolatuda e macia." },
    { id: "b2", nome: "Brownie Ninho", preco: 14.90, desc: "Cobertura cremosa de Ninho." },
    { id: "b3", nome: "Brownie Nutella", preco: 16.90, desc: "Recheio de Nutella." },
    { id: "b4", nome: "Combo 4 unidades", preco: 49.90, desc: "4 brownies sortidos." },
  ];
  // ==================================

  const cart = {}; // {id: {p, qty}}

  const brl = (v) => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

  document.getElementById("igLink").href = `https://www.instagram.com/${INSTAGRAM_USER}/`;

  function renderProdutos() {
    const el = document.getElementById("produtos");
    el.innerHTML = "";

    produtos.forEach(p => {
      const qty = cart[p.id]?.qty || 0;

      const card = document.createElement("div");
      card.style.border = "1px solid #eee";
      card.style.borderRadius = "14px";
      card.style.padding = "12px";
      card.innerHTML = `
        <div style="font-weight:900;">${p.nome}</div>
        <div style="opacity:.72;margin-top:4px;">${p.desc || ""}</div>
        <div style="margin-top:8px;font-weight:800;">${brl(p.preco)}</div>

        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
          <button data-id="${p.id}" data-act="menos"
            style="width:38px;height:38px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;">–</button>

          <div id="q-${p.id}" style="min-width:26px;text-align:center;font-weight:800;">${qty}</div>

          <button data-id="${p.id}" data-act="mais"
            style="width:38px;height:38px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;">+</button>

          <button data-id="${p.id}" data-act="add"
            style="margin-left:auto;padding:10px 10px;border-radius:12px;border:1px solid #111;background:#111;color:#fff;font-weight:800;cursor:pointer;">
            Adicionar
          </button>
        </div>
      `;
      el.appendChild(card);
    });

    el.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        const act = btn.getAttribute("data-act");
        const p = produtos.find(x => x.id === id);
        if (!p) return;

        const cur = cart[id]?.qty || 0;
        let next = cur;

        if (act === "mais") next = cur + 1;
        if (act === "menos") next = cur - 1;
        if (act === "add") next = cur + 1;

        if (next <= 0) delete cart[id];
        else cart[id] = { p, qty: next };

        updateQtyBadges();
        renderCarrinho();
      });
    });
  }

  function updateQtyBadges() {
    produtos.forEach(p => {
      const q = cart[p.id]?.qty || 0;
      const el = document.getElementById("q-" + p.id);
      if (el) el.textContent = String(q);
    });
  }

  function renderCarrinho() {
    const el = document.getElementById("carrinho");
    el.innerHTML = "";

    const items = Object.values(cart);
    if (items.length === 0) {
      el.innerHTML = `<div style="opacity:.7;">Carrinho vazio.</div>`;
      document.getElementById("total").textContent = brl(0);
      return;
    }

    let total = 0;
    items.forEach(it => {
      total += it.p.preco * it.qty;

      const row = document.createElement("div");
      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.gap = "10px";
      row.innerHTML = `
        <div style="font-weight:700;">${it.qty}x ${it.p.nome}</div>
        <div style="font-weight:800;">${brl(it.p.preco * it.qty)}</div>
      `;
      el.appendChild(row);
    });

    document.getElementById("total").textContent = brl(total);
  }

  function igDmLink(text) {
    return `https://ig.me/m/${encodeURIComponent(INSTAGRAM_USER)}?text=${encodeURIComponent(text)}`;
  }

  document.getElementById("finalizar").addEventListener("click", () => {
    const items = Object.values(cart);
    if (items.length === 0) { alert("Adicione itens no carrinho."); return; }

    const nome = document.getElementById("nome").value.trim();
    const fone = document.getElementById("fone").value.trim();
    const tipo = document.getElementById("tipo").value;

    if (!nome) { alert("Informe seu nome."); return; }
    if (!fone) { alert("Informe seu telefone/WhatsApp."); return; }

    let total = 0;
    const linhas = items.map(it => {
      total += it.p.preco * it.qty;
      return `- ${it.qty}x ${it.p.nome} (${brl(it.p.preco)})`;
    });

    const msg =
`Olá! Quero fazer um pedido:

Nome: ${nome}
Telefone: ${fone}
Formato: ${tipo}

Itens:
${linhas.join("\n")}

Total: ${brl(total)}
`;

    window.location.href = igDmLink(msg);
  });

  renderProdutos();
  renderCarrinho();
</script>
</body>
</html>
